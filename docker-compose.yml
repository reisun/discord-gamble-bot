services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${SERVER_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      APP_VERSION: ${APP_VERSION:-1.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_APP_VERSION: ${APP_VERSION:-1.1.0}
      VITE_GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "127.0.0.1:5173:5173"

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      API_BASE_URL: ${API_BASE_URL:-http://server:3000}
      WEB_APP_BASE_URL: ${WEB_APP_BASE_URL:-}
      NODE_ENV: ${NODE_ENV:-development}
      APP_VERSION: ${APP_VERSION:-1.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    depends_on:
      server:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      default: {}
      discord-gamble-bot-net:
        aliases:
          - discord-gamble-bot-nginx
    depends_on:
      - server

volumes:
  db_data:

networks:
  default:
  discord-gamble-bot-net:
    name: discord-gamble-bot-net
    external: true
